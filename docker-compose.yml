services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: pawchive
      POSTGRES_USER: pawchive
      POSTGRES_PASSWORD: ${DB_PASSWORD:-pawchive}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pawchive"]
      interval: 5s
      timeout: 5s
      retries: 10

  migrate:
    build:
      context: .
      dockerfile: Dockerfile.migrate
    environment:
      DATABASE_URL: postgres://pawchive:${DB_PASSWORD:-pawchive}@db:5432/pawchive
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    restart: unless-stopped
    environment:
      PORT: 5000
      DATABASE_URL: postgres://pawchive:${DB_PASSWORD:-pawchive}@db:5432/pawchive
      SESSION_SECRET: ${SESSION_SECRET:-change-me-in-production}
      NODE_ENV: production
    depends_on:
      migrate:
        condition: service_completed_successfully
    expose:
      - "5000"

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:80"
    depends_on:
      - api

volumes:
  postgres_data:
