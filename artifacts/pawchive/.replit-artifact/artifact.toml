kind = "web"
previewPath = "/"
title = "Pawchive"
version = "1.0.0"
id = "artifacts/pawchive"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21349

[services.development]
run = "pnpm --filter @workspace/pawchive run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/pawchive", "run", "build" ]
publicDir = "artifacts/pawchive/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21349"
BASE_PATH = "/"
